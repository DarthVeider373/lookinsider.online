<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Look Inside • Lessons</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		/* Soft vignette + grainy glow */
		.vignette::before {
			content: "";
			position: fixed;
			inset: 0;
			pointer-events: none;
			background:
				radial-gradient(80% 70% at 50% 30%, rgba(255, 255, 255, 0.06), transparent 55%),
				radial-gradient(60% 50% at 20% 10%, rgba(255, 0, 0, 0.05), transparent 60%),
				radial-gradient(60% 50% at 80% 10%, rgba(255, 0, 0, 0.04), transparent 65%),
				radial-gradient(80% 80% at 50% 100%, rgba(255, 255, 255, 0.03), transparent 60%);
		}

		.card-glow {
			box-shadow:
				0 20px 70px -30px rgba(0, 0, 0, 0.85),
				inset 0 1px 0 rgba(255, 255, 255, 0.04);
		}

		.locked-blur {
			backdrop-filter: blur(6px);
			-webkit-backdrop-filter: blur(6px);
		}
	</style>
</head>

<body class="min-h-screen bg-neutral-950 text-white vignette">
	<!-- HEADER (same Look Inside vibe) -->
	<header class="w-full border-b border-white/5 bg-neutral-950/80 locked-blur">
		<div class="max-w-6xl mx-auto px-4 py-5 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
			<!-- Brand -->
			<div class="flex items-center gap-3">
				<div class="w-9 h-9 rounded-lg bg-red-600 flex items-center justify-center shadow-lg shadow-red-600/20">
					<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
						<circle cx="11" cy="11" r="8"></circle>
						<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
					</svg>
				</div>
				<div class="text-base sm:text-lg font-extrabold tracking-tight">
					LOOK <span class="text-red-600">INSIDE</span>
				</div>
			</div>

			<div class="flex items-center gap-3">
				<button class="hidden sm:inline-flex px-3 py-2 text-xs rounded-lg bg-neutral-900/60 border border-white/10 hover:bg-neutral-900 transition">
					Support
				</button>

				<!-- Language Selector (default EN) -->
				<select id="languageSelect" class="px-3 py-2 text-xs sm:text-sm bg-neutral-900/60 border border-white/10 rounded-lg hover:bg-neutral-900 transition focus:outline-none">
					<option value="en" selected>🇺🇸 English</option>
					<option value="es">🇪🇸 Español</option>
					<option value="pt">🇧🇷 Português</option>
				</select>
			</div>
		</div>
	</header>

	<main class="max-w-6xl mx-auto px-4 py-8 sm:py-10">
		<!-- Page title (subtle) -->
		<div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between sm:gap-4">
			<div>
				<h1 class="text-lg sm:text-2xl font-extrabold tracking-tight">Lessons</h1>
				<p class="mt-1 text-xs sm:text-sm text-white/55">Your content unlocks over time. Keep coming back daily.</p>
			</div>
		</div>

		<!-- Grid -->
		<section id="lessonsGrid" class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6"></section>
	</main>

	<!-- Floating support icon (bottom-right) -->
	<a href="mailto:support@lookinsider.online" class="fixed bottom-5 right-5 z-50 group" aria-label="Support" title="Support">
		<div class="w-12 h-12 rounded-full bg-neutral-900/80 border border-white/10 locked-blur grid place-items-center shadow-lg shadow-black/40 transition group-hover:bg-neutral-900">
			<svg class="w-5 h-5 text-white/80 group-hover:text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
				<path d="M4 12a8 8 0 1 1 16 0v5a3 3 0 0 1-3 3h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
				<path d="M6 12v3a2 2 0 0 0 2 2h1" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
				<path d="M18 12v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
			</svg>
		</div>
	</a>

	<script>
		// Keep page default in English; selector is just UI for now
		document.getElementById('languageSelect').addEventListener('change', (e) => {
			const v = e.target.value;
			if (v !== 'en') {
				alert(v === 'es' ? 'Spanish version coming soon.' : 'Portuguese version coming soon.');
				e.target.value = 'en';
			}
		});

		// Lesson data (titles/descriptions inspired by your screenshots)
		const lessons = [
			{ n: 3, title: 'Lesson 3 - Method for iOS and Android', desc: 'A detailed walkthrough of the method adapted for both iOS and Android devices.', art: 'chess' },
			{ n: 4, title: 'Lesson 4 - How to Track a Cell Phone', desc: 'Learn how to track a cell phone with practical, easy-to-follow steps.', art: 'gears' },
			{ n: 5, title: 'Lesson 5 - How to Avoid Being Seen by Spy Apps', desc: 'Protect yourself by learning how to stay invisible to spy applications.', art: 'dna' },
			{ n: 6, title: 'Lesson 6 - How to Discover Locked Conversations', desc: 'Uncover hidden and locked conversations with proven techniques.', art: 'chart' },
			{ n: 7, title: 'Lesson 7 - Method 1', desc: 'The first core method explained in detail with practical examples.', art: 'diamond' },
			{ n: 8, title: 'Lesson 8 - Method 2 Part 1', desc: 'Part one of the second method — building the foundation for advanced techniques.', art: 'star' },
			{ n: 9, title: 'Lesson 9 - Method 2 Part 2', desc: 'Part two of the second method — completing the process with final steps.', art: 'brain' },
			{ n: 10, title: 'Lesson 10 - Bonus', desc: 'Extra insights and shortcuts to accelerate your results.', art: 'grid' },
		];

		// Unlock schedule:
		// First card unlocks in 4 days, then +1 day for each next card.
		// We anchor "start" to first visit (localStorage) so it doesn't reset on refresh.
		const KEY = 'lookinside_unlock_anchor_v1';
		const now = Date.now();
		let anchor = Number(localStorage.getItem(KEY) || 0);
		if (!anchor || Number.isNaN(anchor)) {
			anchor = now;
			localStorage.setItem(KEY, String(anchor));
		}

		function msToParts(ms) {
			const s = Math.max(0, Math.floor(ms / 1000));
			const days = Math.floor(s / 86400);
			const hours = Math.floor((s % 86400) / 3600);
			const mins = Math.floor((s % 3600) / 60);
			const secs = s % 60;
			return { days, hours, mins, secs };
		}

		function pad2(x) {
			return String(x).padStart(2, '0');
		}

		function artSVG(kind) {
			// Minimal line-art SVGs (no external images)
			const common = 'class="absolute inset-0 w-full h-full opacity-40"';
			if (kind === 'dna') {
				return `
            <svg ${common} viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M210 70c80 70 300 70 380 0" stroke="rgba(255,255,255,.25)" stroke-width="6" stroke-linecap="round"/>
              <path d="M210 380c80-70 300-70 380 0" stroke="rgba(255,255,255,.25)" stroke-width="6" stroke-linecap="round"/>
              <path d="M260 115c55 45 225 45 280 0" stroke="rgba(255,255,255,.18)" stroke-width="5" stroke-linecap="round"/>
              <path d="M260 335c55-45 225-45 280 0" stroke="rgba(255,255,255,.18)" stroke-width="5" stroke-linecap="round"/>
              <path d="M300 150h200M290 195h220M280 240h240M290 285h220M300 330h200" stroke="rgba(255,255,255,.12)" stroke-width="4" stroke-linecap="round"/>
            </svg>`;
			}
			if (kind === 'gears') {
				return `
            <svg ${common} viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g stroke="rgba(255,255,255,.22)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="470" cy="210" r="90"/>
                <circle cx="310" cy="255" r="60"/>
              </g>
              <g stroke="rgba(255,255,255,.12)" stroke-width="6" stroke-linecap="round">
                <path d="M470 90v30M470 300v30M380 210h-30M590 210h-30"/>
                <path d="M430 140l-18-24M510 304l-18-24M540 150l24-18M356 264l24-18"/>
                <path d="M510 116l-18 24M412 304l-18 24M564 264l-24-18M380 150l-24-18"/>
              </g>
            </svg>`;
			}
			if (kind === 'chart') {
				return `
            <svg ${common} viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M120 320L280 250L410 280L560 160L700 110" stroke="rgba(255,255,255,.25)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M120 350V120" stroke="rgba(255,255,255,.10)" stroke-width="4"/>
              <path d="M110 320H710" stroke="rgba(255,255,255,.10)" stroke-width="4"/>
              <path d="M560 160l35-10-10 35" stroke="rgba(255,255,255,.18)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="700" cy="110" r="9" fill="rgba(255,255,255,.18)"/>
            </svg>`;
			}
			if (kind === 'diamond') {
				return `
            <svg ${common} viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M400 85L565 225L400 365L235 225L400 85Z" stroke="rgba(255,255,255,.22)" stroke-width="7"/>
              <path d="M400 85v280" stroke="rgba(255,255,255,.10)" stroke-width="4"/>
              <path d="M235 225h330" stroke="rgba(255,255,255,.10)" stroke-width="4"/>
            </svg>`;
			}
			if (kind === 'brain') {
				return `
            <svg ${common} viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M290 330c-55-10-85-55-85-105 0-55 35-105 95-115 10-35 45-60 85-60 30 0 60 15 75 40 15-10 35-15 55-15 55 0 100 45 100 100 0 20-5 40-15 55 15 15 25 35 25 60 0 55-45 100-100 100H290Z" stroke="rgba(255,255,255,.22)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M305 145c25 15 45 40 45 70M420 120c20 25 25 55 10 85M520 150c-10 35-35 55-70 60M560 250c-20 30-55 45-95 40" stroke="rgba(255,255,255,.12)" stroke-width="5" stroke-linecap="round"/>
            </svg>`;
			}
			if (kind === 'star') {
				return `
            <svg ${common} viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M400 95l35 85 92 8-70 60 22 90-79-48-79 48 22-90-70-60 92-8 35-85Z" stroke="rgba(255,255,255,.22)" stroke-width="7" stroke-linejoin="round"/>
              <circle cx="400" cy="225" r="70" stroke="rgba(255,255,255,.10)" stroke-width="4"/>
            </svg>`;
			}
			// chess/grid default
			return `
          <svg ${common} viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M210 310c80-20 150-75 190-145" stroke="rgba(255,255,255,.18)" stroke-width="7" stroke-linecap="round"/>
            <path d="M400 165c40-20 90-25 140-10" stroke="rgba(255,255,255,.14)" stroke-width="6" stroke-linecap="round"/>
            <path d="M140 120h520M140 225h520M140 330h520" stroke="rgba(255,255,255,.08)" stroke-width="3"/>
            <path d="M240 80v290M400 80v290M560 80v290" stroke="rgba(255,255,255,.08)" stroke-width="3"/>
          </svg>`;
		}

		function lessonCardHTML(lesson, idx) {
			const unlockDays = 4 + idx; // requirement
			const unlockAt = anchor + unlockDays * 24 * 60 * 60 * 1000;
			return `
          <article
            class="relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 card-glow"
            data-unlock-at="${unlockAt}"
            data-index="${idx}"
          >
            <!-- art -->
            <div class="relative h-40 sm:h-48 bg-neutral-950">
              <div class="absolute inset-0 bg-gradient-to-tr from-black via-black/60 to-white/5"></div>
              <div class="absolute inset-0 opacity-70">${artSVG(lesson.art)}</div>

              <!-- top row badges -->
              <div class="absolute top-4 left-4 text-[10px] tracking-widest text-white/60">${String(lesson.n).padStart(2, '0')}</div>
              <div class="absolute top-3 right-3">
                <span class="locked-badge inline-flex items-center gap-1 rounded-full bg-neutral-950/70 border border-white/10 px-2.5 py-1 text-[10px] text-white/70">
                  LOCKED
                </span>
              </div>

              <!-- center lock -->
              <div class="lock-center absolute inset-0 grid place-items-center">
                <div class="grid place-items-center w-12 h-12 rounded-full bg-neutral-950/70 border border-white/10">
                  <svg class="w-5 h-5 text-white/60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M6 11h12v9H6v-9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>

            <!-- content -->
            <div class="px-5 py-5 sm:px-6 sm:py-6">
              <h3 class="text-base sm:text-lg font-semibold tracking-tight text-white/85">${lesson.title}</h3>
              <p class="mt-2 text-sm text-white/50 leading-relaxed">${lesson.desc}</p>

              <div class="mt-4 flex items-center gap-2 text-xs text-white/45">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M12 8v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span class="countdown">Unlocks in --</span>
              </div>
            </div>

            <!-- subtle overlay to mimic locked blur -->
            <div class="lock-overlay absolute inset-0 bg-neutral-950/10 pointer-events-none"></div>
          </article>
        `;
		}

		const grid = document.getElementById('lessonsGrid');
		grid.innerHTML = lessons.map(lessonCardHTML).join('');

		function tick() {
			const cards = grid.querySelectorAll('[data-unlock-at]');
			const t = Date.now();
			cards.forEach((card) => {
				const unlockAt = Number(card.getAttribute('data-unlock-at'));
				const countdownEl = card.querySelector('.countdown');
				const badge = card.querySelector('.locked-badge');
				const center = card.querySelector('.lock-center');
				const overlay = card.querySelector('.lock-overlay');

				const remaining = unlockAt - t;
				if (remaining <= 0) {
					countdownEl.textContent = 'Unlocked';
					// visually unlock
					if (badge) badge.textContent = 'UNLOCKED';
					if (badge) badge.className = 'inline-flex items-center gap-1 rounded-full bg-emerald-500/10 border border-emerald-400/20 px-2.5 py-1 text-[10px] text-emerald-200/90';
					if (center) center.style.display = 'none';
					if (overlay) overlay.style.background = 'transparent';
				} else {
					const { days, hours, mins, secs } = msToParts(remaining);
					countdownEl.textContent = `Unlocks in ${days}d ${pad2(hours)}h ${pad2(mins)}m ${pad2(secs)}s`;
				}
			});
		}

		tick();
		setInterval(tick, 1000);
	</script>
</body>

</html>
